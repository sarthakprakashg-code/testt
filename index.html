<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Sweetie 💝</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;overflow:hidden;background:#111;}

.screen{
    position:absolute;width:100%;height:100vh;
    display:flex;justify-content:center;align-items:center;
    padding:20px;transition:1s ease;
}
.hidden{opacity:0;pointer-events:none;}

#screen1{background:linear-gradient(135deg,#ff9a9e,#fad0c4);}
#screen2{background:linear-gradient(135deg,#667eea,#764ba2);}
#screen3{background:linear-gradient(135deg,#f6d365,#fda085);}
#screen4{background:linear-gradient(135deg,#232526,#414345);}
#screen5{background:linear-gradient(135deg,#fc466b,#3f5efb);}

.card{
    width:360px;max-width:95%;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border-radius:25px;padding:30px;text-align:center;
    color:white;
}

button{
    margin-top:15px;padding:12px 20px;border:none;
    border-radius:25px;cursor:pointer;
    color:white;background:linear-gradient(45deg,#ff6a88,#ff99ac);
}

#ignoreBtn{position:relative;}

.airplane{font-size:70px;cursor:pointer;}
.fly{transform:translate(300px,-300px);opacity:0;transition:1s;}

.photo-box{width:240px;height:320px;margin:auto;position:relative;}
.photo-box img{width:100%;height:100%;border-radius:15px;border:8px solid white;}

.overlay-text{
    position:absolute;bottom:15px;left:10px;right:10px;
    background:rgba(0,0,0,0.5);padding:10px;border-radius:12px;
}
</style>
</head>
<body>

<audio id="voice" src="audio/voice.mp3"></audio>

<!-- Screen 1 -->
<div id="screen1" class="screen">
<div class="card">
<h1>Hey cutie 🫶</h1>
<button onclick="nextScreen(1,2)">Open 💝</button>
<button id="ignoreBtn">Ignore 😼</button>
</div>
</div>

<!-- Screen 2 -->
<div id="screen2" class="screen hidden">
<div class="card">
<h2>I was missing you 💝</h2>
<button onclick="nextScreen(2,3)">Next</button>
</div>
</div>

<!-- Screen 3 -->
<div id="screen3" class="screen hidden">
<div class="card">
<h2>Sending this ✈️</h2>
<div class="airplane" onclick="flyPlane()">✈️</div>
</div>
</div>

<!-- Screen 4 -->
<div id="screen4" class="screen hidden">
<div class="card">
<h2>Things about you 😼</h2>
<button onclick="nextScreen(4,5)">Next</button>
</div>
</div>

<!-- Screen 5 -->
<div id="screen5" class="screen hidden">
<div class="card">

<div class="photo-box">
<img id="photo" src="./66.jpeg" onerror="this.src='./66.jpg'">
<div id="typeText" class="overlay-text"></div>
</div>

<button onclick="nextPhoto()">Next 📸</button>
</div>
</div>

<script>

function nextScreen(f,t){
document.getElementById("screen"+f).classList.add("hidden");
document.getElementById("screen"+t).classList.remove("hidden");
if(t===5) startPhoto();
}

document.getElementById("ignoreBtn").onclick=function(){
this.style.transform=`translate(${Math.random()*200-100}px,${Math.random()*150-75}px)`;
};

function flyPlane(){
document.querySelector(".airplane").classList.add("fly");
setTimeout(()=>nextScreen(3,4),800);
}

/* 🔥 BULLETPROOF IMAGE SYSTEM */
let photos=["./66.jpeg","./3.jpeg","./2.jpeg"];

let texts=["cute 😼","my weakness 🥹","still unfair 💝"];
let i=0;

function startPhoto(){
i=0;
loadImage(photos[0]);
type(texts[0]);
}

function loadImage(src){
let img=document.getElementById("photo");
img.src=src;

// fallback to .jpg if .jpeg fails
img.onerror=function(){
this.onerror=null;
this.src=src.replace(".jpeg",".jpg");
};
}

function type(t){
let el=document.getElementById("typeText");
el.innerHTML="";
let j=0;
let x=setInterval(()=>{
if(j<t.length) el.innerHTML+=t[j++];
else clearInterval(x);
},40);
}

function nextPhoto(){
i++;
if(i<photos.length){
loadImage(photos[i]);
type(texts[i]);
}else{
document.getElementById("voice").play().catch(()=>{});
}
}

</script>

</body>
</html>
